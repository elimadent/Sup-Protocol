document.getElementById('p-n').innerHTML=h;
}
function drI(){
var stk=0,need=0,ord=0;var rl=[];
for(var i=0;i<IV.length;i++){var st=ist[i]||0;if(st===0)stk++;else if(st===1){need++;rl.push(IV[i].n);}else ord++;}
var h='<div class="isum"><div class="ist">Supplement Inventory</div><div class="isr">';
h+='<div><div class="isn" style="color:#10b981">'+stk+'</div><div class="isl">Stocked</div></div>';
h+='<div><div class="isn" style="color:#ef4444">'+need+'</div><div class="isl">Need to Order</div></div>';
h+='<div><div class="isn" style="color:#f59e0b">'+ord+'</div><div class="isl">On the Way</div></div>';
h+='</div></div>';
if(rl.length>0){h+='<div class="iro"><div class="irt">Reorder List</div>';for(var j=0;j<rl.length;j++){h+='<div class="iri">* '+rl[j]+'</div>';}h+='</div>';}
h+='<div class="ihn">Tap status to cycle: <b style="color:#10b981">Stocked</b> > <b style="color:#ef4444">Reorder</b> > <b style="color:#f59e0b">Ordered</b> > <b style="color:#10b981">Stocked</b></div>';
h+='<div class="stt">All Supplements</div>';
for(var k=0;k<IV.length;k++){
var item=IV[k];var st2=ist[k]||0;
var cls='ic';var badge='Stocked';var bcls='ibg ibs';
if(st2===1){cls='ic need';badge='Reorder';bcls='ibg ibr';}
else if(st2===2){cls='ic ord';badge='Ordered';bcls='ibg ibo';}
h+='<div class="'+cls+'" onclick="cyI('+k+')"><div><div class="inm">'+item.n+'</div><div class="isb">'+item.s+'</div></div><div class="'+bcls+'">'+badge+'</div></div>';
}
document.getElementById('p-i').innerHTML=h;
}
setInterval(function(){try{var s=localStorage.getItem('p2:'+dk());if(!s&&Object.keys(ck).length>0){ck={};drP();upH();document.getElementById('sM').textContent='New day - checklist reset';}}catch(e){}},60000);
ldC();ldI();drP();drC();drN();drI();upH();
</script>
