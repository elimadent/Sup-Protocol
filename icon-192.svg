<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#f0f6fc"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#f0f6fc"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f0f6fc"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Capsule 1 (green) - left, tilted -->
  <g transform="translate(52,96) rotate(-20)">
    <rect x="-12" y="-36" width="24" height="72" rx="12" fill="url(#pill1)" opacity="0.95"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#0d1117" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Capsule 2 (blue) - center -->
  <g transform="translate(96,88) rotate(5)">
    <rect x="-12" y="-36" width="24" height="72" rx="12" fill="url(#pill2)" opacity="0.95"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#0d1117" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Capsule 3 (amber) - right, tilted -->
  <g transform="translate(140,96) rotate(15)">
    <rect x="-12" y="-36" width="24" height="72" rx="12" fill="url(#pill3)" opacity="0.95"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#0d1117" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Small round tablet bottom left -->
  <circle cx="38" cy="148" r="10" fill="#ec4899" opacity="0.8"/>
  <!-- Small round tablet bottom right -->
  <circle cx="154" cy="145" r="8" fill="#06b6d4" opacity="0.8"/>
  <!-- Plus symbol top right corner -->
  <g transform="translate(152,42)" opacity="0.6">
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
